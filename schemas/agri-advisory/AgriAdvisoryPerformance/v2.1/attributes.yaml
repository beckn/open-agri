openapi: 3.1.1
$id: "https://schema.beckn.io/AgriAdvisoryPerformance/v2.1/attributes.yaml"
info:
  title: AgriAdvisoryPerformance Schema
  version: "2.1.0"
  description: >
    Schema for agri advisory performance attributes in the Beckn agri advisory
    network. Extends AgriDigitalPerformance (which extends ServicePerformance)
    to capture advisory-specific delivery evidence: the advisory identifier,
    generation timestamp, crop season context, validity window, and the number
    of farmers reached in bulk delivery scenarios.

    Used in on_update and on_status responses to confirm advisory delivery and
    to record delivery evidence for government MIS/reporting and entitlement
    drawdown reconciliation.
  x-beckn-container: performanceAttributes

components:
  schemas:
    AgriAdvisoryPerformance:
      allOf:
        - $ref: "https://schema.beckn.io/AgriDigitalPerformance/v2.1/attributes.yaml#/components/schemas/AgriDigitalPerformance"
      type: object
      x-beckn-container: performanceAttributes
      x-status: under-review
      x-tags:
        - agri-advisory
        - performance
      x-jsonld:
        "@context": "https://schema.beckn.io/AgriAdvisoryPerformance/v2.1/context.jsonld"
        "@type": "aap:AgriAdvisoryPerformance"

      # Inherited from AgriDigitalPerformance → ServicePerformance:
      #   deliveryMode              — channel used (APP, SMS, WHATSAPP, IVR, etc.)
      #   requestedLanguage         — BCP 47 language requested
      #   deliveredLanguage         — BCP 47 language actually used
      #   contentAccessUrl          — URL to access advisory content
      #   contentAccessExpiry       — when the URL expires
      #   targetLocation            — CodedValue for geographic scope of advisory
      #   contentRef                — Provider NP internal content reference
      #   deliveredAt               — dispatch timestamp
      #   deliveryConfirmed         — delivery receipt confirmed
      #   providerConfirmedCompletion / clientConfirmedCompletion (ServicePerformance)
      #   serviceNotes, followUpRequired, followUpDate (ServicePerformance)

      properties:
        advisoryId:
          type: string
          description: >
            Unique identifier assigned by the Provider NP to this specific
            advisory instance. Used for traceability, re-fetch, duplicate
            detection, and grievance linkage.
          x-jsonld-id: "aap:advisoryId"
        advisoryType:
          type: string
          enum:
            - PEST_ALERT
            - DISEASE_ALERT
            - SOWING_GUIDANCE
            - FERTILISER_SCHEDULE
            - IRRIGATION_ADVISORY
            - HARVEST_GUIDANCE
            - WEATHER_BASED_ADVISORY
            - MARKET_LINKED_ADVISORY
            - GENERAL_AGRONOMY
            - WEATHER_FORECAST
            - COMMODITY_PRICE
          description: >
            The specific type of advisory delivered in this performance instance.
            Should correspond to one of the advisoryTypes listed in the resource.
          x-jsonld-id: "aap:advisoryType"
        generatedAt:
          type: string
          format: date-time
          description: >
            ISO 8601 timestamp when the advisory content was generated by the
            Provider NP's system. May precede deliveredAt if content is pre-generated
            and batch-dispatched.
          x-jsonld-id: "aap:generatedAt"
        cropSeasonRef:
          type: string
          description: >
            Reference to the crop season this advisory applies to. Use a
            network-defined season code or a human-readable descriptor.
            Examples: "KH-2025" (Kharif 2025), "RB-2025-26" (Rabi 2025-26),
            "LONG-RAINS-2025" (East Africa long rains season).
          x-jsonld-id: "aap:cropSeasonRef"
        validityWindowHours:
          type: integer
          minimum: 1
          description: >
            Number of hours from deliveredAt during which the advisory content
            is considered actionable. After this window the advice may be stale.
            Example: 48 for a 2-day pest spray recommendation.
          x-jsonld-id: "aap:validityWindowHours"
        farmersReached:
          type: integer
          minimum: 0
          description: >
            Number of individual farmer end-recipients reached by this advisory
            delivery. Relevant for bulk procurement / government scheme flows where
            a single engagement covers many farmers. Used for MIS reporting and
            entitlement drawdown reconciliation (units consumed).
          x-jsonld-id: "aap:farmersReached"
        cropTypes:
          type: array
          description: >
            Crops this specific advisory instance pertains to. Expressed as
            CodedValue entries from the same authority used in the resource
            (e.g. FAO AGROVOC).
          items:
            $ref: "https://schema.beckn.io/CodedValue/v2.1/attributes.yaml#/components/schemas/CodedValue"
          x-jsonld-id: "aap:cropTypes"
        dataSnapshotRef:
          type: string
          description: >
            Reference to the data snapshot (weather observation, price report,
            pest survey record) used to generate this advisory. Supports
            dispute resolution and audit trails.
          x-jsonld-id: "aap:dataSnapshotRef"
